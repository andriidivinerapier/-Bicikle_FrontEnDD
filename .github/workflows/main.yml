name: Deploy to DigitalOcean
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: SFTP Deploy
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: 'root'
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 21
          source: "./*"
          target: "/var/www/html"
